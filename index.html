<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="30min 体验视频内容与脚本清单">
  <title>30min 体验视频内容与脚本清单</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-2: #f5f5f5;
      --line: #e5e5e5;
      --line-bright: #d0d0d0;
      --text: #1a1a1a;
      --muted: #666666;
      --accent: #8a5a1a;
      --accent-2: #6b4410;
      --green: #1f7a45;
      --blue: #1a6b8a;
      --shadow: 0 8px 28px rgba(0, 0, 0, .06);
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.75 "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .hero {
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .hero-inner {
      max-width: 1460px;
      margin: auto;
      padding: 54px 32px 42px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .hero h1 {
      max-width: 920px;
      margin: 0;
      font-family: Georgia, "Microsoft YaHei", serif;
      font-size: clamp(32px, 5vw, 64px);
      line-height: 1.08;
      letter-spacing: -.035em;
      color: #111;
    }

    .hero-copy {
      max-width: 780px;
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .stat {
      min-width: 128px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fafafa;
    }

    .stat strong { display: block; color: var(--accent-2); font-size: 20px; }
    .stat span { color: var(--muted); font-size: 12px; }

    .toolbar {
      position: sticky;
      z-index: 30;
      top: 0;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(18px);
    }

    .toolbar-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      max-width: 1460px;
      margin: auto;
      padding: 12px 32px;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 680px;
    }

    .search-wrap span {
      position: absolute;
      top: 50%;
      left: 14px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    #search {
      width: 100%;
      min-height: 42px;
      padding: 8px 14px 8px 40px;
      border: 1px solid var(--line-bright);
      border-radius: 9px;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(138, 90, 26, .12); }

    .action {
      min-height: 42px;
      padding: 8px 15px;
      border: 1px solid var(--line-bright);
      border-radius: 9px;
      background: #fff;
      color: var(--accent-2);
      font-weight: 700;
    }

    .action:hover { border-color: var(--accent); background: #faf7f2; }
    .action.primary {
      border-color: #9fd4b0;
      background: #f0faf3;
      color: var(--green);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      user-select: none;
    }

    .toggle input { accent-color: var(--accent); }

    .layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 44px;
      max-width: 1460px;
      margin: auto;
      padding: 34px 32px 80px;
      background: #fff;
    }

    .toc {
      position: sticky;
      top: 82px;
      align-self: start;
      max-height: calc(100vh - 104px);
      overflow: auto;
      padding-right: 12px;
    }

    .toc-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .toc a {
      display: block;
      padding: 6px 9px;
      border-left: 1px solid var(--line);
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.4;
    }

    .toc a[data-level="3"] { padding-left: 18px; font-size: 12px; }
    .toc a:hover, .toc a.active { border-color: var(--accent); color: var(--accent-2); background: #faf7f2; }

    main {
      min-width: 0;
      padding: 2px 0 80px;
    }

    main h1 { display: none; }
    main h2, main h3 {
      scroll-margin-top: 88px;
      font-family: Georgia, "Microsoft YaHei", serif;
      line-height: 1.25;
    }

    main h2 {
      margin: 68px 0 18px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: #111;
      font-size: 29px;
    }

    main > h2:first-of-type { margin-top: 0; }
    main h3 { margin: 40px 0 14px; color: #222; font-size: 21px; }
    main p { max-width: 980px; color: #333; }
    main ul, main ol { max-width: 980px; padding-left: 24px; }
    main li { margin: 4px 0; color: #333; }
    main strong { color: #111; }
    main code {
      padding: .13em .38em;
      border: 1px solid #edd9b5;
      border-radius: 5px;
      background: #fbf6ee;
      color: #8a5a1a;
      font: .92em/1.4 Consolas, monospace;
    }

    blockquote {
      margin: 20px 0 28px;
      padding: 12px 18px;
      border-left: 3px solid var(--accent);
      background: #faf7f2;
      color: var(--muted);
    }

    blockquote p { margin: 0; color: var(--muted); }

    .table-wrap {
      width: 100%;
      margin: 16px 0 30px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
      font-size: 13px;
      line-height: 1.55;
    }

    th {
      position: sticky;
      z-index: 2;
      top: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-bright);
      background: #f7f7f7;
      color: #333;
      text-align: left;
      white-space: nowrap;
    }

    td {
      position: relative;
      min-width: 90px;
      padding: 13px 14px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
      color: #333;
    }

    tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #fafafa; }
    td:first-child code { white-space: nowrap; }

    td.prompt-cell {
      min-width: 310px;
      padding-right: 46px;
      color: #1a3d28;
      background: #f4faf6;
    }

    td.status-cell { min-width: 142px; white-space: nowrap; }
    td.status-cell a { color: var(--blue); font-weight: 700; text-decoration: none; }
    td.status-cell a:hover { text-decoration: underline; }

    .copy-cell {
      position: absolute;
      top: 9px;
      right: 9px;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid #b7d9c3;
      border-radius: 7px;
      background: #fff;
      color: var(--green);
      font-size: 14px;
    }

    .copy-cell:hover { border-color: var(--green); background: #f0faf3; }

    .code-card {
      position: relative;
      max-width: 980px;
      margin: 16px 0 24px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8f8f8;
    }

    pre {
      margin: 0;
      padding: 22px 58px 22px 20px;
      overflow: auto;
      color: #222;
      white-space: pre-wrap;
      font: 13px/1.7 Consolas, "Microsoft YaHei", monospace;
    }

    pre code { padding: 0; border: 0; background: none; color: inherit; }

    .copy-code {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 9px;
      border: 1px solid var(--line-bright);
      border-radius: 7px;
      background: #fff;
      color: var(--accent-2);
      font-size: 12px;
    }

    .hint {
      max-width: 980px;
      margin: 0 0 18px;
      padding: 10px 14px;
      border: 1px solid #c5e0ea;
      border-radius: 10px;
      background: #f3f9fc;
      color: var(--blue);
      font-size: 13px;
    }

    .no-results {
      display: none;
      padding: 48px;
      border: 1px dashed var(--line-bright);
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      z-index: 100;
      right: 22px;
      bottom: 22px;
      padding: 11px 15px;
      border: 1px solid #9fd4b0;
      border-radius: 9px;
      background: #fff;
      color: var(--green);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      transition: .2s ease;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: none; }

    @media (max-width: 900px) {
      .hero-inner { padding: 40px 20px 32px; }
      .toolbar-inner { padding: 10px 16px; }
      .layout { display: block; padding: 24px 16px 60px; }
      .toc { display: none; }
      .action span { display: none; }
      main h2 { font-size: 25px; }
      table { min-width: 760px; }
    }

    @media print {
      body { background: #fff; color: #111; }
      .toolbar, .toc, .copy-cell, .copy-code, .toast, .hint { display: none !important; }
      .hero { background: #fff; border-color: #aaa; }
      .hero-inner, .layout { max-width: none; padding: 20px; }
      .layout { display: block; }
      .table-wrap, .code-card { break-inside: avoid; box-shadow: none; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Dungeon Tavern · Video Production Bible</p>
      <h1>30min 体验视频内容与脚本清单</h1>
      <p class="hero-copy">完整收录视频资产、分镜脚本与 AI 视频生成参考提示词。点击表格提示词右侧按钮即可复制；默认会自动拼接通用前缀。</p>
      <div class="stats" aria-label="文档统计">
        <div class="stat"><strong id="assetCount">—</strong><span>视频资产</span></div>
        <div class="stat"><strong id="promptCount">—</strong><span>可复制提示词</span></div>
        <div class="stat"><strong id="sectionCount">—</strong><span>内容章节</span></div>
        <div class="stat"><strong id="doneCount">0</strong><span>已完成视频</span></div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner">
      <label class="search-wrap">
        <span>⌕</span>
        <input id="search" type="search" placeholder="搜索视频名、角色、场景或提示词…" autocomplete="off">
      </label>
      <label class="toggle" title="复制时自动拼接 0.1 通用前缀与场景前缀">
        <input id="withPrefix" type="checkbox" checked>
        复制时带前缀
      </label>
      <button class="action primary" id="copyAll" type="button">复制<span>全部提示词</span></button>
      <button class="action" id="printPage" type="button">打印<span> / PDF</span></button>
    </div>
  </div>

  <div class="layout">
    <aside class="toc" aria-label="目录">
      <p class="toc-title">目录</p>
      <nav id="toc"></nav>
    </aside>
    <main id="content"></main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const markdown = "# 30min 体验视频内容与脚本清单\r\n\r\n> 本文档基于 `Demo/docs/UI及交互设计需求.md` 中的主界面、点单、厨房、打酒、满意/不满意反馈、外出和突发事件页面，重新整理 30 分钟体验需要的视频内容。此版不展开交互设计，只列视频资产、视频名、5-10 秒 AI 视频可生成的大致脚本和参考提示词。\r\n\r\n## 0. 制作口径\r\n\r\n- 单条视频长度：5-10 秒。超过 10 秒的动作建议拆成多个片段。\r\n- 视频不承载关键文字：订单名、金币、按钮和结果文案由 UI 叠加。\r\n- 画幅：竖屏 9:16，主体放中间，上方留 HUD，下方留按钮区。\r\n- 风格：地牢酒馆、暖色火光、潮湿石墙、木质吧台，怪物荒唐可爱，不做血腥恐怖。\r\n- 反馈规则：酒水只判断容器是否合适，容器正确为正向反馈，容器不合适为负向反馈；菜肴仍判断熟度，熟的时候出锅为正向反馈，烤糊或煮糊为负向反馈。\r\n- 酒水容器规则：大块头·巴鲁与中个子哥布林·半高·皮克的正确容器为酒桶，错误容器为酒杯；骷髅兵、断牙·格里克、铜角·莫洛克的正确容器为酒杯，错误容器为酒桶。提示词中直接写「酒桶」或「酒杯」，不使用「合适容器」。\r\n- `黑酒` 是黑黑的一种酒，怪物们普遍喜欢；接入 full 代码时可映射到现有基础酒水或新增独立配方。\r\n- `荧光酒` 是荧光蓝色的酒水，强调冷蓝色发光酒液和蓝色泡沫。\r\n\r\n### 0.1 通用视频提示词前缀\r\n\r\n每条视频生成参考提示词默认拼接以下前缀：\r\n\r\n```text\r\n竖屏 9:16，5-10 秒，地牢酒馆题材，暖色火光，潮湿石墙，木质吧台，手绘描边，微 3D 动画质感，主体居中，上方和下方预留游戏 UI 安全区，不出现文字，不出现现代物品，不血腥，不恐怖。不出现背景音乐，仅保留音效。\r\n```\r\n\r\n如果是外出探索视频，再额外拼接：\r\n\r\n```text\r\n固定玩家外出探索第一人称视角，玩家双手出现在画面前方进行采集、捡拾、交换或提灯照明，画面为地牢酒馆外场景，不出现吧台、桌面或前台道具，不出现其他围观怪物或群体反应。\r\n```\r\n\r\n如果是怪物顾客视频，再额外拼接：\r\n\r\n```text\r\n固定玩家前台第一人称视角，玩家双手放在面前桌面或吧台边缘，画面里只出现当前怪物和玩家手部/桌面道具，不出现其他怪物客人、其他顾客影子、围观痕迹或群体反应。\r\n```\r\n\r\n如果是地精商人采购视频，再额外拼接：\r\n\r\n```text\r\n固定玩家第一人称视角，场景为地牢里一间被改造成商店的小牢房，潮湿石墙、铁栅栏门、窄小壁龛和昏暗烛火清晰可见。画面主体是商人滑舌格里姆、靠墙货架、木箱货物、金币托盘和手写账页，商品名、价格、数量和台词由 UI 叠加，视频只表现进入、交流和交易动作。\r\n```\r\n\r\n## 1. 30min 体验视频总览\r\n\r\n| 分类 | 内容范围 | 建议条数 | 备注 |\r\n| --- | --- | ---: | --- |\r\n| 外出探索 | 4 个场景，每个 2-3 种结果 | 12 | 每条 6-8 秒，可直接接结果 UI |\r\n| 地精商人采购 | 进入店铺、交流待机、结账交易 | 3 | 对应 full 中 `phase=merchant` 采购界面 |\r\n| 经营开场/转场/收场 | 进入酒馆、营业准备、清桌开业、记账离店 | 6 | 第一人称连续动作，用于经营流程首尾与阶段衔接 |\r\n| 怪物进场点单 | 5 位客人，每人 1 条入场点餐、1 条待机循环，每种餐品/酒水保留正负反馈 | 50 | 5 条入场点餐 + 5 条待机循环 + 40 条反馈 |\r\n| 酒水制作 | 黑酒、荧光酒；酒杯/酒桶两种容器与从带龙头大酒桶接酒画面 | 8 | 容器选择是判定依据，接酒只做表现 |\r\n| 菜肴制作 | 烤肉排、蘑菇汤；生到熟、熟到糊、熟出锅、糊出锅 | 8 | 正负反馈直接复用熟/糊结果 |\r\n| 突发事件 | 营业中的危机、正向事件和伦理质疑 | 24 | 每个事件拆触发/处理/成功/失败 |\r\n\r\n## 2. 经营开场/转场/收场视频\r\n\r\n这组视频负责串联一次完整经营流程：进入酒馆、查看当日情报、整理前台正式营业，以及营业结束后的记账离店。情报文字和账本记录由 UI 叠加，视频中的账页保持空白或只有无法辨认的简略笔迹。\r\n\r\n镜头统一规则：\r\n\r\n- 固定玩家第一人称视角，玩家双手自然参与推门、翻账本、收纳和关门。\r 玩家划掉部分账单，格里克开心拍桌，金币变少。                               |\r\n| `event_grik_bargain_fail.mp4`     |  5-7s | 失败   | 哥布林朋友们起哄乱跑，桌面杯子被撞歪，逃单风险明显上升。            | 突发事件失败，哥布林朋友起哄乱跑，桌面杯子被撞歪，吧台显得混乱。                                  |\r\n\r\n## 8. 生产优先级\r\n\r\n### P0：先保证 30min 体验完整跑通\r\n\r\n- 6 条经营开场、转场与收场视频。\r\n- 12 条外出探索结果视频。\r\n- 3 条地精商人采购视频（进入店铺、交流待机、结账交易）。\r\n- 5 位客人的入场点餐视频。\r\n- 5 条待机循环视频。\r\n- 每个客人每种餐品/酒水的正/负反馈视频。\r\n- 2 种酒的容器选择和从带龙头大酒桶接酒表现视频。\r\n- 2 种菜的熟/糊制作和出锅视频。\r\n- 哥布林逃单、大块头坐坏桌椅、醉酒闹事 3 个核心突发事件。\r\n\r\n### P1：增强变化感（暂不考虑）\r\n\r\n- 吵闹高潮和客人维护秩序，用于第 7 天或高满意度局面。\r\n- 如需增强等待态，可为同一怪物追加第二套情绪更明显的 idle 循环，但 P0 先保证每位怪物 1 条。\r\n";

    const PREFIX = {
      base: "竖屏 9:16，5-10 秒，地牢酒馆题材，暖色火光，潮湿石墙，木质吧台，手绘描边，微 3D 动画质感，主体居中，上方和下方预留游戏 UI 安全区，不出现文字，不出现现代物品，不血腥，不恐怖。不出现背景音乐，仅保留音效。",
      explore: "固定玩家外出探索第一人称视角，玩家双手出现在画面前方进行采集、捡拾、交换或提灯照明，画面为地牢酒馆外场景，不出现吧台、桌面或前台道具，不出现其他围观怪物或群体反应。",
      customer: "固定玩家前台第一人称视角，玩家双手放在面前桌面或吧台边缘，画面里只出现当前怪物和玩家手部/桌面道具，不出现其他怪物客人、其他顾客影子、围观痕迹或群体反应。",
      merchant: "固定玩家第一人称视角，场景为地牢里一间被改造成商店的小牢房，潮湿石墙、铁栅栏门、窄小壁龛和昏暗烛火清晰可见。画面主体是商人滑舌格里姆、靠墙货架、木箱货物、金币托盘和手写账页，商品名、价格、数量和台词由 UI 叠加，视频只表现进入、交流和交易动作。"
    };

    const escapeHtml = (value) => String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    const inline = (value) => {
      let text = escapeHtml(value.trim());
      text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
      text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      return text;
    };

    function splitRow(line) {
      return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(part => part.trim());
    }

    function slugify(text, used) {
      const base = text.replace(/`/g, "").replace(/[^\w\u4e00-\u9fff]+/g, "-").replace(/^-|-$/g, "").toLowerCase() || "section";
      const count = used.get(base) || 0;
      used.set(base, count + 1);
      return count ? `${base}-${count + 1}` : base;
    }

    function renderMarkdown(source) {
      const lines = source.replace(/\r/g, "").split("\n");
      const html = [];
      const usedSlugs = new Map();
      let currentVideoFolder = "";
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];
        if (!line.trim()) { i++; continue; }

        if (line.startsWith("```")) {
          const language = line.slice(3).trim();
          const code = [];
          i++;
          while (i < lines.length && !lines[i].startsWith("```")) code.push(lines[i++]);
          i++;
          html.push(`<div class="code-card"><button class="copy-code" type="button">复制</button><pre data-language="${escapeHtml(language)}"><code>${escapeHtml(code.join("\n"))}</code></pre></div>`);
          continue;
        }

        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
          const level = heading[1].length;
          const id = slugify(heading[2], usedSlugs);
          if (level === 2) {
            const section = heading[2].match(/^([2-7])\.\s/);
            currentVideoFolder = section ? section[1] : "";
          } else if (level === 3) {
            const subsection = heading[2].match(/^([2-7])\.(\d+)\s/);
            if (subsection) currentVideoFolder = `${subsection[1]}/${subsection[1]}.${subsection[2]}`;
          }
          html.push(`<h${level} id="${id}">${inline(heading[2])}</h${level}>`);
          i++;
          continue;
        }

        if (line.startsWith(">")) {
          const quote = [];
          while (i < lines.length && lines[i].startsWith(">")) quote.push(lines[i++].replace(/^>\s?/, ""));
          html.push(`<blockquote><p>${inline(quote.join(" "))}</p></blockquote>`);
          continue;
        }

        if (line.trim().startsWith("|") && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|/.test(lines[i + 1])) {
          const headers = splitRow(line);
          i += 2;
          const rows = [];
          while (i < lines.length && lines[i].trim().startsWith("|")) rows.push(splitRow(lines[i++]));
          if (headers[0] === "视频名") {
            const promptIndex = headers.findIndex(header => /提示词/.test(header));
            headers.splice(promptIndex + 1, 0, "状态");
            rows.forEach(row => {
              row.splice(promptIndex + 1, 0, "待制作");
            });
          }
          const videoFolder = currentVideoFolder;
          html.push('<div class="table-wrap"><table><thead><tr>');
          headers.forEach(cell => html.push(`<th>${inline(cell)}</th>`));
          html.push("</tr></thead><tbody>");
          rows.forEach(row => {
            const videoName = (row[0] || "").replace(/`/g, "").trim();
            html.push("<tr>");
            headers.forEach((header, index) => {
              const prompt = /提示词/.test(header);
              const status = header === "状态";
              const content = row[index] || "";
              let attributes = "";
              if (prompt) {
                attributes = ` class="prompt-cell" data-prompt="true" data-video="${escapeHtml(videoName)}"`;
              } else if (status) {
                const videoSrc = `videos/${videoFolder}/${videoName}`;
                attributes = ` class="status-cell" data-video-src="${escapeHtml(videoSrc)}"`;
              }
              html.push(`<td${attributes}>${inline(content)}${prompt && content ? '<button class="copy-cell" type="button" title="复制提示词" aria-label="复制提示词">⧉</button>' : ""}</td>`);
            });
            html.push("</tr>");
          });
          html.push("</tbody></table></div>");
          continue;
        }

        if (/^\s*[-*]\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*[-*]\s+/, ""));
          html.push(`<ul>${items.map(item => `<li>${inline(item)}</li>`).join("")}</ul>`);
          continue;
        }

        if (/^\s*\d+\.\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*\d+\.\s+/, ""));
          html.push(`<ol>${items.map(item => `<li>${inline(item)}</li>`).join("")}</ol>`);
          continue;
        }

        const paragraph = [line.trim()];
        i++;
        while (i < lines.length && lines[i].trim() && !/^(#{1,3})\s|^```|^>|^\s*\||^\s*[-*]\s+|^\s*\d+\.\s+/.test(lines[i])) {
          paragraph.push(lines[i++].trim());
        }
        html.push(`<p>${inline(paragraph.join(" "))}</p>`);
      }

      return html.join("\n");
    }

    function categoryPrefix(videoName) {
      if (videoName.startsWith("explore_")) return PREFIX.explore;
      if (videoName.startsWith("merchant_")) return PREFIX.merchant;
      if (videoName.startsWith("cust_")) return PREFIX.customer;
      return "";
    }

    function buildFullPrompt(detail, videoName, withPrefix) {
      if (!withPrefix) return detail;
      const parts = [PREFIX.base];
      const extra = categoryPrefix(videoName || "");
      if (extra) parts.push(extra);
      parts.push(detail);
      return parts.join("\n");
    }

    const content = document.querySelector("#content");
    content.innerHTML = '<p class="hint">提示：表格「视频生成参考提示词」列右侧 ⧉ 可一键复制。默认开启「复制时带前缀」，会自动拼接 0.1 通用前缀与外出/顾客/商人场景前缀。</p>' + renderMarkdown(markdown);

    const doneCountEl = document.querySelector("#doneCount");
    let doneCount = 0;
    const videoProbes = new Set();
    content.querySelectorAll("[data-video-src]").forEach(cell => {
      const src = cell.dataset.videoSrc;
      const probe = document.createElement("video");
      let settled = false;
      const finish = () => {
        if (settled) return;
        settled = true;
        probe.removeAttribute("src");
        videoProbes.delete(probe);
      };
      probe.preload = "metadata";
      probe.addEventListener("loadedmetadata", () => {
        const link = document.createElement("a");
        link.href = src;
        link.target = "_blank";
        link.rel = "noopener";
        link.textContent = "播放当前制作结果";
        link.title = src;
        cell.replaceChildren(link);
        doneCount += 1;
        doneCountEl.textContent = String(doneCount);
        finish();
      }, { once: true });
      probe.addEventListener("error", finish, { once: true });
      videoProbes.add(probe);
      probe.src = src;
    });

    const headings = [...content.querySelectorAll("h2, h3")];
    const toc = document.querySelector("#toc");
    toc.innerHTML = headings.map(h => `<a href="#${h.id}" data-level="${h.tagName.slice(1)}">${h.textContent}</a>`).join("");

    const promptCells = [...content.querySelectorAll("[data-prompt=true]")];
    const withPrefixEl = document.querySelector("#withPrefix");

    function cellDetail(cell) {
      const clone = cell.cloneNode(true);
      clone.querySelector("button")?.remove();
      return clone.textContent.trim();
    }

    function allPrompts() {
      return promptCells
        .map(cell => buildFullPrompt(cellDetail(cell), cell.dataset.video || "", withPrefixEl.checked))
        .filter(Boolean);
    }

    document.querySelector("#assetCount").textContent = new Set([...content.querySelectorAll("td:first-child code")].map(node => node.textContent).filter(name => name.endsWith(".mp4"))).size;
    document.querySelector("#promptCount").textContent = promptCells.filter(cell => cellDetail(cell)).length;
    document.querySelector("#sectionCount").textContent = content.querySelectorAll("h2").length;

    const toast = document.querySelector("#toast");
    let toastTimer;
    function notify(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.cssText = "position:fixed;opacity:0";
        document.body.append(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    }

    content.addEventListener("click", async event => {
      const cellButton = event.target.closest(".copy-cell");
      if (cellButton) {
        const cell = cellButton.closest("td");
        const text = buildFullPrompt(cellDetail(cell), cell.dataset.video || "", withPrefixEl.checked);
        await copyText(text);
        notify(withPrefixEl.checked ? "完整提示词已复制（含前缀）" : "提示词已复制");
        return;
      }

      const codeButton = event.target.closest(".copy-code");
      if (codeButton) {
        await copyText(codeButton.nextElementSibling.textContent);
        notify("代码块已复制");
      }
    });

    document.querySelector("#copyAll").addEventListener("click", async () => {
      const prompts = allPrompts();
      await copyText(prompts.join("\n\n---\n\n"));
      notify(`已复制 ${prompts.length} 条提示词`);
    });

    document.querySelector("#printPage").addEventListener("click", () => window.print());

    const search = document.querySelector("#search");
    const noResults = document.createElement("div");
    noResults.className = "no-results";
    noResults.textContent = "没有找到匹配内容，请尝试其他关键词。";
    content.prepend(noResults);

    search.addEventListener("input", () => {
      const query = search.value.trim().toLocaleLowerCase();
      const blocks = [...content.children].filter(node => node !== noResults);
      let visible = 0;
      blocks.forEach(block => {
        const matches = !query || block.textContent.toLocaleLowerCase().includes(query);
        block.hidden = !matches;
        if (matches) visible++;
      });
      noResults.style.display = visible ? "none" : "block";
    });

    const links = [...toc.querySelectorAll("a")];
    const observer = new IntersectionObserver(entries => {
      entries.filter(entry => entry.isIntersecting).forEach(entry => {
        links.forEach(link => link.classList.toggle("active", link.hash === `#${entry.target.id}`));
      });
    }, { rootMargin: "-90px 0px -72% 0px" });
    headings.forEach(heading => observer.observe(heading));
  </script>
</body>
</html>
